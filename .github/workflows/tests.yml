name: Tests

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        php: [8.0, 8.1, 8.2, 8.3, 8.4]
        laravel: ['8.*', '9.*', '10.*', '11.*', '12.*']
        stability: [prefer-lowest, prefer-stable]
        exclude:
          # Laravel 8 & 9 max PHP is 8.1 (unofficially works on 8.2+ but not tested by Taylor)
          - laravel: '8.*'
            php: 8.2
          - laravel: '8.*'
            php: 8.3
          - laravel: '8.*'
            php: 8.4
          - laravel: '9.*'
            php: 8.3
          - laravel: '9.*'
            php: 8.4
          # Laravel 10+ dropped PHP 8.0
          - laravel: '10.*'
            php: 8.0
          # Laravel 11+ dropped PHP 8.0 and 8.1
          - laravel: '11.*'
            php: 8.0
          - laravel: '11.*'
            php: 8.1
          # Laravel 12 same as 11
          - laravel: '12.*'
            php: 8.0
          - laravel: '12.*'
            php: 8.1

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction --ignore-platform-req=php

      - name: List installed dependencies
        run: composer show -D

      - name: Execute tests
        run: vendor/bin/pest --ci
